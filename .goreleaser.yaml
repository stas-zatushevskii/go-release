version: 2

# Имя проекта. Используется в имени бинарника и архива.
project_name: PR101-10__RMQ_GW

builds:
  - id: app
    main: .
    binary: "{{ .ProjectName }}"

    env:
      - CGO_ENABLED=0

    # Под какие ОС собирать.
    goos:
      - linux

    # Архитектура.
    goarch:
      - amd64

    ldflags:
      - -s -w -X main.Version={{ .Env.BUILD_VERSION }}

archives:
  - id: app-archive
    ids:
      - app

    formats:
      - zip

    # Имя архива.
    # Пример:
    # PR101-10__RMQ_GW_20260624_1917.zip
    name_template: "{{ .ProjectName }}_{{ .Env.BUILD_VERSION }}"

    files:
      - src: cfg/config.ini
        dst: cfg/config.ini

checksum:
  name_template: "checksums.txt"

snapshot:
  version_template: "{{ .Env.BUILD_VERSION }}"

changelog:
  disable: true
