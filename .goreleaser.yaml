version: 2

# Имя проекта. Используется в имени бинарника и архива.
project_name: PR101-10__RMQ_GW

env:
  - TZ=Europe/Chisinau

before:
  hooks:
    - go mod tidy
    - go clean -cache -testcache
    - go test -count=1 ./...
    - go run github.com/golangci/golangci-lint/v2/cmd/golangci-lint@v2.12.0 run --timeout=5m ./...

builds:
  - id: app
    main: .
    binary: "{{ .ProjectName }}"

    env:
      - CGO_ENABLED=0

    # Под какие ОС собирать.
    goos:
      # CHANGE ME:
      #- linux
      - darwin # !!!

    goarch:
      #- amd64
      - arm64 # !!!

    ldflags:
      - -s -w -X main.Version={{ .Version }}

archives:
  - id: app-archive
    ids:
      - app

    formats:
      - zip

    # Имя архива.
    # Пример:
    # PR101-10__RMQ_GW_20260624_1917.zip
    name_template: "{{ .ProjectName }}_{{ .Version }}"

    files:
      - src: cfg/config.ini
        dst: cfg/config.ini

      - src: cfg/maintenance.txt
        dst: cfg/maintenance.txt

checksum:
  name_template: "checksums.txt"

release:
  disable: true

snapshot:
  version_template: '{{ .Now.Local.Format "20060102_1504" }}'

changelog:
  disable: true
